name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 构建产物（不创建 release）────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS ARM
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            label: macOS x64
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: Linux x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
      CMAKE_OSX_DEPLOYMENT_TARGET: "12.0"
      CXXFLAGS: "-std=c++17"
      CMAKE_ARGS: "-DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DCMAKE_CXX_STANDARD=17"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev

      - run: npm ci

      # ── Windows 专用：构建"绿色版" zip ─────────────────
      - name: Build Windows portable (no bundle, then zip)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # 1) 仅编译二进制，不打包 installer
          npm run tauri:build -- --target ${{ matrix.target }} --no-bundle
          if ($LASTEXITCODE -ne 0) { throw "tauri build (no-bundle) 失败" }

          $version = "${{ github.ref_name }}" -replace '^v', ''
          $binDir  = "src-tauri/target/${{ matrix.target }}/release"
          $name    = "KingdeeKB-${version}-windows-x64-portable"
          $stage   = "build/${name}"

          if (-not (Test-Path "$binDir/kingdee-kb.exe")) {
            throw "找不到编译产物 $binDir/kingdee-kb.exe"
          }

          # 2) 准备绿色版目录
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # 3) 复制主可执行文件
          Copy-Item "$binDir/kingdee-kb.exe" $stage

          # 4) 复制运行时 DLL
          Get-ChildItem "$binDir/*.dll" -ErrorAction SilentlyContinue |
            Copy-Item -Destination $stage

          # 5) 复制 resources
          $srcResources = "src-tauri/resources"
          if (Test-Path $srcResources) {
            Copy-Item $srcResources "$stage/resources" -Recurse -Force
          }
          $srcSkills = "skills"
          if (Test-Path $srcSkills) {
            Copy-Item $srcSkills "$stage/skills" -Recurse -Force
          }

          # 6) 写入使用说明
          @"
          KingdeeKB 绿色版 v${version}
          ==============================

          使用方法
          --------
          1. 解压到任意目录（建议路径无中文、无空格）
          2. 双击 kingdee-kb.exe 即可运行
          3. 首次启动会自动创建用户数据目录：%APPDATA%\com.neal.kingdee-kb
          4. 进入「设置」配置 LLM API Key

          注意事项
          --------
          - 需要 WebView2 Runtime：Win11 已预装，Win10 需手动安装
            下载：https://developer.microsoft.com/microsoft-edge/webview2/
          - 绿色版与安装版共用用户数据目录，可任意切换
          - 升级时直接覆盖整个目录即可（保留数据目录）
          - 杀毒软件可能误报，请将整个目录加入白名单
          "@ | Out-File "$stage/README.txt" -Encoding UTF8

          # 7) 打包成 zip
          $zip = "build/${name}.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path $stage -DestinationPath $zip -CompressionLevel Optimal

          Write-Host "=== 绿色版构建完成 ==="
          Get-ChildItem $zip | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}}

      # ── 标准安装包构建（仅编译，不创建 release）──
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 不传 tagName/releaseName/releaseId = 只构建不上传
          args: --target ${{ matrix.target }}

      # ── 上传构建产物供 release job 使用 ─────────
      - name: Upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
            build/*.zip
          if-no-files-found: ignore

  # ── 统一创建 release，等所有构建完成 ─────────
  release:
    needs: [build]
    runs-on: ubuntu-24.04
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts

      - name: List downloaded artifacts (debug)
        shell: bash
        run: |
          echo "=== 下载的产物目录结构 ==="
          set +o pipefail
          find downloaded-artifacts -type f -size +0 | head -n 80
          set -o pipefail
          echo ""
          echo "=== 按扩展名分类 ==="
          find downloaded-artifacts -type f -size +0 | sed 's/.*\.//' | sort | uniq -c | sort -rn
          echo ""
          echo "=== 匹配发布规则的文件 ==="
          find downloaded-artifacts -type f -size +0 \( \
              -iname '*.msi' -o \
              -iname '*-setup.exe' -o \
              -iname '*-portable.zip' -o \
              -iname '*.dmg' -o \
              -iname '*.AppImage' -o \
              -iname '*.deb' \
            \) || echo "(无匹配)"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ github.ref_name }}"

          # 幂等：release 已存在则复用现有草稿（重跑安全）
          # 先建草稿，待产物上传齐全后由 Publish 步骤转为正式发布
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version 已存在，复用现有草稿"
          else
            gh release create "$version" \
              --title "KingdeeKB $version" \
              --notes "## KingdeeKB ${version}

            金蝶 ERP 实施知识库桌面应用 — AI 驱动的调研助手、风险把控、文档生成。

            ### 下载说明

            **Windows**
            - \`.msi\` / \`.exe\`：标准安装包（推荐，含卸载程序、开始菜单快捷方式）
            - \`-portable.zip\`：绿色版（无需安装，解压即用，适合便携场景）

            **macOS**
            - \`.dmg\`（ARM 用于 Apple Silicon，x64 用于 Intel）

            **Linux**
            - \`.AppImage\`：免安装，\`chmod +x\` 后直接运行
            - \`.deb\`：Debian / Ubuntu 安装包

            ### 首次使用
            1. 启动应用
            2. 进入「设置」配置 LLM API Key
            3. 在「知识库」中导入文档
            4. 在「AI 助手」中开始提问" \
              --draft
          fi

      - name: Upload artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ github.ref_name }}"

          # 上传面向用户的发布产物（安装包 + 绿色版）
          #   安装包：.msi (WiX) / *-setup.exe (NSIS) / .dmg / .deb
          #   绿色版：*-portable.zip
          mapfile -t files < <(find downloaded-artifacts -type f -size +0 \( \
              -iname '*.msi' -o \
              -iname '*-setup.exe' -o \
              -iname '*-portable.zip' -o \
              -iname '*.dmg' -o \
              -iname '*.AppImage' -o \
              -iname '*.deb' \
            \) | sort)

          # 零匹配则中止：避免后续 Publish 步骤发布一个没有任何安装包的空 release
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::未匹配到任何发布产物，中止发布（不创建空 release）"
            echo "::notice::请检查上方 debug 步骤输出的目录结构，确认文件名是否匹配 find 模式"
            exit 1
          fi

          echo "将上传 ${#files[@]} 个发布产物："
          printf '  - %s\n' "${files[@]}"

          # 一次性上传：任一文件失败即整体失败，不掩盖部分上传失败
          gh release upload "$version" "${files[@]}" --clobber
          echo "=== 发布产物已上传（共 ${#files[@]} 个）==="

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ github.ref_name }}"
          # 产物上传齐全后，将草稿转为正式发布（避免公开"产物未传完"的中间态）
          gh release edit "$version" --draft=false
          echo "Release 已发布:"
          echo "https://github.com/${{ github.repository }}/releases/tag/$version"
