<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实施顾问AI助手</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .container {
        text-align: center;
        animation: fadeIn 0.5s ease-in;
      }
      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        color: #e94560;
      }
      h1 {
        color: #ffffff;
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: 2px;
      }
      p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
      }
      .loader {
        margin-top: 30px;
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .loader-bar {
        width: 30%;
        height: 100%;
        background: linear-gradient(90deg, #e94560, #0f3460);
        border-radius: 2px;
        animation: loading 1.5s ease-in-out infinite;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes loading {
        0% { width: 0%; margin-left: 0; }
        50% { width: 60%; margin-left: 20%; }
        100% { width: 0%; margin-left: 100%; }
      }
      @media (prefers-color-scheme: light) {
        body {
          background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 50%, #dce4ff 100%);
        }
        h1 { color: #1a1a2e; }
        p { color: rgba(26, 26, 46, 0.6); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">📚</div>
<h1>实施顾问AI助手</h1>
<p>金蝶ERP实施顾问知识管理工具</p>
      <div class="loader">
        <div class="loader-bar"></div>
      </div>
    </div>
  </body>
</html>
